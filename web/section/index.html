<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0b0d12">
  <title>Wand Maestro — Section</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: ui-monospace, "Courier New", monospace; background: #0c0608; color: #f6e7c9; overflow: hidden; }
    #join {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: radial-gradient(circle at 50% 40%, #1a1206, #0c0608); cursor: pointer;
    }
    #join h1 { font-size: clamp(2rem, 12vw, 4rem); font-weight: 800; letter-spacing: -0.03em; color: #e7c583; text-shadow: 0 2px 0 #7a4a12, 0 3px 10px #000; }
    #join p { opacity: 0.6; font-size: 1rem; }
    #stage { position: fixed; inset: 0; display: none; flex-direction: column; }
    #pulse { flex: 1; display: flex; align-items: center; justify-content: center;
             font-size: clamp(3rem, 20vw, 8rem); font-weight: 800; transition: background 60ms ease-out; }
    #hud { padding: 0.75rem 1rem; font: 12px ui-monospace, monospace; background: #0c0608; border-top: 1px solid #3a2c1a;
           display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem 1rem; }
    #hud .k { opacity: 0.5; }
    #hud .full { grid-column: 1 / -1; }
    #trimrow { display: flex; align-items: center; gap: 0.5rem; }
    #trimrow input { flex: 1; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e5484d; }
    .dot.ok { background: #46d17a; }
  </style>
</head>
<body>
  <div id="join">
    <h1>TAP TO JOIN</h1>
    <p id="joinsub">the orchestra</p>
  </div>

  <div id="stage">
    <div id="pulse">—</div>
    <div id="hud">
      <div class="full"><span class="dot" id="dot"></span> <span id="sid">connecting…</span></div>
      <div><span class="k">audio</span> <span id="audio">—</span></div>
      <div><span class="k">θ offset</span> <span id="theta">—</span></div>
      <div><span class="k">recv</span> <span id="recv">0</span></div>
      <div><span class="k">played</span> <span id="clicks">0</span></div>
      <div><span class="k">rtt</span> <span id="rtt">—</span></div>
      <div><span class="k">last</span> <span id="last">—</span></div>
      <div class="full" id="trimrow">
        <span class="k">trim</span>
        <input type="range" id="trim" min="-100" max="100" value="0" step="1">
        <span id="trimval">0ms</span>
      </div>
      <div class="full"><button id="leave">✕ leave the orchestra</button></div>
    </div>
  </div>

  <!-- Phones suspend audio when the screen sleeps; resuming needs a real tap.
       This makes that unmissable instead of a tiny HUD label. -->
  <div id="unmute" style="display:none">
    <h1>🔇</h1>
    <p><b>Tap to unmute</b></p>
    <p class="s">your phone paused the audio while the screen was off</p>
  </div>

  <div id="leftscreen" style="display:none">
    <h1>👋</h1>
    <p><b>You left the orchestra</b></p>
    <p class="s">tap anywhere to rejoin</p>
  </div>

  <style>
    #leave { width: 100%; margin-top: .35rem; padding: .55rem; font: 700 12px ui-monospace, monospace;
      color: #f0b9b9; background: #2a1113; border: 1px solid #7a3a3e; border-radius: 6px; cursor: pointer; }
    #unmute, #leftscreen { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .6rem; cursor: pointer; text-align: center;
      background: radial-gradient(circle at 50% 40%, #241206f2, #0c0608fa); }
    #unmute h1, #leftscreen h1 { font-size: 4rem; }
    #unmute b, #leftscreen b { color: #e7c583; font-size: 1.2rem; }
    #unmute .s, #leftscreen .s { opacity: .55; font-size: .85rem; max-width: 30ch; }
  </style>

  <script type="module" src="./section.js"></script>
</body>
</html>
