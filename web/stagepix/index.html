<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05060a">
  <title>Wand Maestro — Stage (pixel)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #05060a; color: #f4e9d6;
      font-family: ui-monospace, "Courier New", monospace; overflow: hidden; }
    img { image-rendering: pixelated; -ms-interpolation-mode: nearest-neighbor;
      user-select: none; -webkit-user-drag: none; }

    /* The 448x256 backdrop is fit to the viewport keeping aspect; every overlay
       positions in % of this box, so the whole scene scales as one unit. */
    #stagewrap {
      position: absolute; inset: 0; margin: auto;
      width: min(100vw, calc(100vh * (448 / 256)));
      height: min(100vh, calc(100vw * (256 / 448)));
      aspect-ratio: 448 / 256;
    }
    #bg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Foreground curtain legs — the house drape at the proscenium, pulled to the
       sides. z above the musicians, so the orchestra plays *behind* them and any
       performer straying to the edge is framed/occluded (true depth). */
    .curtain { position: absolute; top: 0; height: 100%; width: auto; z-index: 1100;
      pointer-events: none; }
    .curtain.left  { left: 0; }
    .curtain.right { right: 0; transform: scaleX(-1); }

    /* Musicians: bottom-center anchored on the floor line; sprite height is set
       in px from JS (a % of the stage), so the whole arc scales as one. */
    .player { position: absolute; transform: translate(-50%, -100%); will-change: filter; }
    .player .sprite { display: block; width: auto;
      transition: transform 90ms cubic-bezier(.2,.8,.3,1.5); }
    .player.hit .sprite { transform: translateY(-15%) scale(1.04); }
    /* Contact shadow grounds each musician on the floor. */
    .player .shadow { position: absolute; left: 50%; bottom: 2%; transform: translateX(-50%);
      width: 60%; height: 8%; z-index: -1; border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.55), rgba(0,0,0,0) 70%); }
    .player .tag { position: absolute; left: 50%; top: 101%; transform: translateX(-50%);
      font-size: 9px; line-height: 1.1; text-align: center; color: #e6d2ab;
      text-shadow: 0 1px 2px #000, 0 0 3px #000; white-space: nowrap; }
    .player .tag .off { color: #8794aa; }
    .player.dropped .sprite { filter: grayscale(1) brightness(.5); }

    .pulse { position: absolute; transform: translate(-50%, -50%); pointer-events: none;
      animation: floatup 780ms ease-out forwards; }
    @keyframes floatup {
      0%   { opacity: 0; transform: translate(-50%, -40%) scale(.5); }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -260%) scale(1.2); }
    }

    /* Conductor's podium sits downstage-centre, in front of the whole orchestra;
       the wand hovers above it and lights up when a real wand connects. */
    #conductor { position: absolute; left: 50%; bottom: 13%; transform: translateX(-50%); z-index: 1000; }
    #podium { display: block; width: auto; }
    #wand { position: absolute; left: 50%; bottom: 26%; width: auto; z-index: 1010;
      transform-origin: center bottom; animation: bob 2.6s ease-in-out infinite; transition: filter 200ms; }
    @keyframes bob {
      0%, 100% { transform: translate(-50%, 0) rotate(-5deg); }
      50%      { transform: translate(-50%, -16%) rotate(5deg); }
    }
    #wand.armed { filter: drop-shadow(0 0 6px #ffd76a) drop-shadow(0 0 13px #ff9d3c); }

    /* HUD + join card framed by the generated ui_panel border. */
    .panel { border-image: url(../assets/ui_panel.png) 24 fill / 24px stretch; }
    #hud { position: fixed; top: 14px; left: 14px; width: 250px; padding: 24px 20px 18px;
      font-size: 12px; line-height: 1.5; }
    #hud h1 { font-size: 14px; letter-spacing: .06em; color: #ffd76a; text-shadow: 0 1px 2px #000; margin-bottom: 4px; }
    #hud .row { display: flex; justify-content: space-between; gap: 8px; }
    #hud .k { color: #a99274; }
    #spread { font-weight: 700; }
    #admin { display: flex; gap: 6px; margin-top: 12px; }
    #admin button { flex: 1; cursor: pointer; font-family: inherit; font-size: 11px; padding: 7px 4px;
      color: #1a120a; background: #ffd76a; border: 0; border-radius: 3px; font-weight: 700; }
    #admin button.stop { background: #e5686a; color: #fff; }
    #admin button.warn { background: #e5a23d; }

    #joincard { position: fixed; right: 14px; bottom: 14px; padding: 16px 18px 12px;
      text-align: center; font-size: 11px; }
    #joincard .lbl { color: #ffd76a; letter-spacing: .08em; margin-bottom: 7px; }
    #qr { width: 128px; height: 128px; margin: 0 auto; background: #fff; padding: 6px; border-radius: 4px; }
    #qr svg { width: 100%; height: 100%; display: block; }
    #joincard a { color: #ffca6b; }
    #joinsub { margin-top: 7px; color: #cdb894; max-width: 148px; }
    #joincard a { cursor: pointer; }

    /* Webcam-wand dock: the hand-tracking conductor embedded in the stage. */
    #camtoggle { position: fixed; left: 14px; bottom: 14px; z-index: 15; cursor: pointer;
      padding: 12px 16px; color: #ffd76a; font-family: inherit; font-size: 12px;
      letter-spacing: .04em; background: transparent; }
    #camtoggle:hover { color: #ffe9a8; }
    #camdock { position: fixed; left: 14px; bottom: 14px; z-index: 16; width: 340px; height: 300px;
      display: flex; flex-direction: column; padding: 24px 10px 12px; }
    #camhead { display: flex; justify-content: space-between; align-items: center;
      color: #ffd76a; font-size: 11px; letter-spacing: .06em; padding: 0 4px 7px; }
    #camhead .grp { display: flex; gap: 10px; align-items: center; }
    #camhead a, #camhead button { color: #ffd76a; background: transparent; border: 0;
      cursor: pointer; text-decoration: none; font-size: 14px; line-height: 1; }
    #camframe { flex: 1; width: 100%; border: 0; border-radius: 4px; background: #000; }
    [hidden] { display: none !important; }

    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e5484d; }
    .dot.ok { background: #46d17a; }

    /* Start splash (needed to unlock audio). */
    #splash { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; cursor: pointer;
      background: radial-gradient(circle at 50% 42%, #1a1226ee, #05060aee); }
    #splash h1 { font-size: clamp(28px, 8vw, 60px); color: #ffd76a; text-shadow: 0 2px 0 #7a4a12, 0 3px 10px #000; letter-spacing: .04em; }
    #splash p { color: #cdb894; }
    #splash .go { margin-top: 6px; padding: 12px 26px; background: #ffd76a; color: #1a120a;
      border-radius: 8px; font-weight: 800; font-size: 18px; }
  </style>
</head>
<body>
  <div id="stagewrap">
    <img id="bg" src="../assets/hall_back.png" alt="stage">
    <div id="players"></div>
    <div id="fx"></div>
    <div id="conductor"><img id="podium" src="../assets/podium.png" alt="podium"></div>
    <img id="wand" src="../assets/wand.png" alt="wand">
    <!-- Foreground house curtains (in front of the orchestra) -->
    <img class="curtain left" src="../assets/curtain_side.png" alt="">
    <img class="curtain right" src="../assets/curtain_side.png" alt="">
  </div>

  <div id="hud" class="panel">
    <h1>♪ WAND MAESTRO</h1>
    <div class="row"><span class="k" id="status">connecting…</span></div>
    <div class="row"><span class="k">clock spread</span> <span id="spread">—</span></div>
    <div class="row"><span class="k">performers</span> <span id="count">0</span></div>
    <div class="row"><span class="k">wand</span> <span><span class="dot" id="wanddot"></span> <span id="wandstate">—</span></span></div>
    <div id="admin">
      <button id="start2">▶ Start</button>
      <button id="stop" class="stop">■ Stop</button>
      <button id="panic" class="warn">✷ off</button>
    </div>
    <div class="row" style="margin-top:10px; font-size:11px; gap:14px">
      <a href="../guide/" target="_blank" style="color:#ffca6b; text-decoration:none">📖 how it works</a>
      <a href="../editor/" target="_blank" style="color:#ffca6b; text-decoration:none">🎛 editor</a>
    </div>
  </div>

  <div id="joincard" class="panel">
    <div class="lbl">SCAN TO CONDUCT</div>
    <div id="qr"></div>
    <div id="joinsub">phone waves the wand · or <a id="cvlink">use webcam →</a></div>
  </div>

  <button id="camtoggle" class="panel">🎥 webcam wand</button>
  <div id="camdock" class="panel" hidden>
    <div id="camhead">
      <span>🎥 WEBCAM WAND</span>
      <span class="grp">
        <a id="campop" href="../cvwand/" target="_blank" title="open in its own tab">⤢</a>
        <button id="camclose" title="close">✕</button>
      </span>
    </div>
    <iframe id="camframe" title="webcam wand" allow="camera"></iframe>
  </div>

  <div id="splash">
    <h1>🪄 Wand Maestro</h1>
    <p>the orchestra plays here</p>
    <div class="go">Tap to begin</div>
  </div>

  <script src="../vendor/qrcode.js"></script>
  <script type="module" src="./stagepix.js"></script>
</body>
</html>
